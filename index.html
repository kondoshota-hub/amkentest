<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>単語テスト練習アプリ - 155問完全版</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'BIZ UDPGothic', sans-serif; max-width: 700px; margin: 20px auto; padding: 20px; background: #f4f7f6; color: #2d3436; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; position: relative; }
        h2 { color: #0984e3; margin-top: 0; }
        .mode-btn { padding: 15px; width: 90%; font-size: 18px; cursor: pointer; border: none; border-radius: 12px; background: #0984e3; color: white; margin: 10px auto; display: block; transition: 0.3s; }
        .mode-btn:hover { background: #74b9ff; transform: translateY(-2px); }
        .prog-text { color: #636e72; font-size: 14px; margin-bottom: 15px; }
        .question { font-size: 20px; font-weight: bold; margin: 30px 0; line-height: 1.6; color: #2d3436; text-align: left; padding: 15px; border-left: 5px solid #0984e3; background: #f9f9f9; border-radius: 0 10px 10px 0; }
        .input-container { margin-bottom: 25px; }
        input[type="text"] { width: 85%; padding: 15px; font-size: 20px; border: 2px solid #dfe6e9; border-radius: 12px; outline: none; transition: 0.3s; text-align: center; }
        input[type="text"]:focus { border-color: #0984e3; }
        .result-msg { font-size: 18px; margin: 20px 0; min-height: 100px; }
        .correct { color: #27ae60; font-weight: bold; font-size: 24px; }
        .wrong { color: #e74c3c; font-weight: bold; font-size: 24px; }
        .ans-box { background: #fff5f5; border: 1px solid #ffcccc; padding: 15px; border-radius: 8px; margin-top: 10px; display: block; text-align: left; font-size: 16px; line-height: 1.5; color: #2d3436; }
        .btn-container { display: flex; justify-content: center; gap: 10px; height: 55px; }
        .action-btn { padding: 12px 30px; font-size: 18px; cursor: pointer; border: none; border-radius: 10px; color: white; min-width: 150px; }
        #check-btn { background: #0984e3; }
        #next-btn { background: #00b894; }
        .reset-btn { position: absolute; top: 15px; right: 15px; background: #dfe6e9; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; color: #636e72; }
        .archive-section { margin-top: 40px; text-align: left; background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .archive-title { font-size: 16px; font-weight: bold; color: #636e72; margin-bottom: 10px; display: flex; justify-content: space-between; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; font-size: 13px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="setup" class="card">
    <h2>単語テスト 練習アプリ</h2>
    <p>全155問 収録済み</p>
    <button class="mode-btn" onclick="initGame('word2mean')">単語 → 意味</button>
    <button class="mode-btn" onclick="initGame('mean2word')">意味 → 単語</button>
    <button class="mode-btn" onclick="initGame('mix')">ミックス形式</button>

    <div class="archive-section">
        <div class="archive-title">
            <span>過去の学習履歴 (直近10回)</span>
            <span onclick="clearHistory()" style="font-weight:normal; font-size:11px; color:#d63031; cursor:pointer; text-decoration:underline;">履歴を消去</span>
        </div>
        <table id="history-table">
            <thead>
                <tr><th>日時</th><th>モード</th><th>正解数</th><th>正答率</th></tr>
            </thead>
            <tbody id="history-body"></tbody>
        </table>
    </div>
</div>

<div id="game" class="card hidden">
    <button class="reset-btn" onclick="resetToMain()">× 中断</button>
    <div id="prog" class="prog-text"></div>
    <div class="question" id="q-text"></div>
    <div class="input-container">
        <input type="text" id="ans-input" autocomplete="off" placeholder="答えを入力">
    </div>
    <div id="res-msg" class="result-msg"></div>
    <div class="btn-container">
        <button id="check-btn" class="action-btn" onclick="check()">回答 (Enter)</button>
        <button id="next-btn" class="action-btn hidden" onclick="goNext()">次へ (Enter)</button>
    </div>
</div>

<div id="result" class="card hidden">
    <h2>トレーニング終了！</h2>
    <div id="score-display" style="font-size: 32px; margin: 20px 0; font-weight: bold;"></div>
    <div id="review-area"></div>
    <button class="mode-btn" style="background:#636e72; margin-top: 20px;" onclick="resetToMain()">タイトルに戻る</button>
</div>

let pool = []; let idx = 0; let score = 0; let wrongs = []; let globalMode = '';

window.onload = () => updateHistoryTable();

function initGame(mode) {
    globalMode = mode;
    startRound([...masterData]);
}

function startRound(list) {
    pool = list.sort(() => Math.random() - 0.5);
    idx = 0; score = 0; wrongs = [];
    document.getElementById('setup').classList.add('hidden');
    document.getElementById('result').classList.add('hidden');
    document.getElementById('game').classList.remove('hidden');
    showQuestion();
}

function showQuestion() {
    const item = pool[idx];
    let q, a;
    let currentType = globalMode;
    if (globalMode === 'mix') currentType = Math.random() > 0.5 ? 'word2mean' : 'mean2word';

    if (currentType === 'word2mean') { q = item.w; a = item.m; } 
    else { q = item.m; a = item.w; }

    item.activeA = a;
    document.getElementById('prog').innerText = "問題 " + (idx + 1) + " / " + pool.length;
    document.getElementById('q-text').innerText = q;
    document.getElementById('ans-input').value = "";
    document.getElementById('ans-input').disabled = false;
    document.getElementById('res-msg').innerText = "";
    document.getElementById('check-btn').classList.remove('hidden');
    document.getElementById('next-btn').classList.add('hidden');
    document.getElementById('ans-input').focus();
}

function check() {
    const input = document.getElementById('ans-input');
    const user = input.value.trim().toLowerCase();
    const ans = pool[idx].activeA.trim().toLowerCase();
    const msgArea = document.getElementById('res-msg');

    input.disabled = true;
    if (user === ans) {
        msgArea.innerHTML = "<div class='correct'>正解！</div>";
        score++;
    } else {
        msgArea.innerHTML = "<div class='wrong'>不正解...</div><div class='ans-box'>正解: <b>" + pool[idx].activeA + "</b></div>";
        wrongs.push(pool[idx]);
    }
    document.getElementById('check-btn').classList.add('hidden');
    document.getElementById('next-btn').classList.remove('hidden');
    document.getElementById('next-btn').focus();
}

function goNext() {
    idx++;
    if (idx < pool.length) showQuestion();
    else finishGame();
}

function finishGame() {
    document.getElementById('game').classList.add('hidden');
    document.getElementById('result').classList.remove('hidden');
    const percent = Math.round((score / pool.length) * 100);
    document.getElementById('score-display').innerText = score + " / " + pool.length + " (" + percent + "%)";

    saveToHistory(globalMode, score, pool.length);

    const reviewArea = document.getElementById('review-area');
    reviewArea.innerHTML = "";
    if (wrongs.length > 0) {
        const btn = document.createElement('button');
        btn.className = "mode-btn";
        btn.style.background = "#00b894";
        btn.innerText = "間違えた " + wrongs.length + " 問だけ再挑戦";
        btn.onclick = () => startRound([...wrongs]);
        reviewArea.appendChild(btn);
    }
}

function resetToMain() {
    if (idx > 0 && idx < pool.length) {
        if (!confirm("メイン画面に戻りますか？現在の進行状況は保存されません。")) return;
    }
    document.getElementById('game').classList.add('hidden');
    document.getElementById('result').classList.add('hidden');
    document.getElementById('setup').classList.remove('hidden');
    updateHistoryTable();
}

function saveToHistory(mode, s, total) {
    const history = JSON.parse(localStorage.getItem('study_history_155') || '[]');
    const now = new Date();
    const modeJa = {'word2mean':'単→意', 'mean2word':'意→単', 'mix':'MIX'}[mode] || '復習';
    history.unshift({
        date: (now.getMonth()+1) + "/" + now.getDate() + " " + now.getHours() + ":" + now.getMinutes().toString().padStart(2,'0'),
        mode: modeJa,
        score: s + "/" + total,
        percent: Math.round((s/total)*100) + '%'
    });
    localStorage.setItem('study_history_155', JSON.stringify(history.slice(0, 10)));
}

function updateHistoryTable() {
    const history = JSON.parse(localStorage.getItem('study_history_155') || '[]');
    const tbody = document.getElementById('history-body');
    tbody.innerHTML = history.map(h => "<tr><td>" + h.date + "</td><td>" + h.mode + "</td><td>" + h.score + "</td><td>" + h.percent + "</td></tr>").join('');
}

function clearHistory() {
    if (confirm("履歴を削除しますか？")) {
        localStorage.removeItem('study_history_155');
        updateHistoryTable();
    }
}

document.getElementById('ans-input').onkeypress = (e) => {
    if (e.key === 'Enter') {
        if (!document.getElementById('check-btn').classList.contains('hidden')) check();
        else if (!document.getElementById('next-btn').classList.contains('hidden')) goNext();
    }
};
